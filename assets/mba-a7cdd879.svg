<svg width="500" height="400" viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect x="0" y="0" width="500" height="400" fill="#f5f7fa" opacity="0.5" rx="20" ry="20"/>

  <!-- 毕业帽 -->
  <g transform="translate(250, 120) scale(1.2)">
    <!-- 帽子底座 -->
    <rect x="-60" y="20" width="120" height="10" fill="#2c3e50"/>

    <!-- 帽子顶部 -->
    <polygon points="0,-40 -60,20 60,20" fill="#409EFF"/>

    <!-- 帽子顶部装饰 -->
    <circle cx="0" cy="-10" r="8" fill="#2c3e50"/>

    <!-- 帽穗 -->
    <path d="M0,-10 Q20,30 40,40" stroke="#FFD700" stroke-width="3" fill="none"/>
    <circle cx="40" cy="40" r="5" fill="#FFD700"/>
  </g>

  <!-- 书籍 -->
  <g transform="translate(150, 250)">
    <!-- 书本1 -->
    <rect x="-50" y="-15" width="100" height="30" fill="#e74c3c" rx="2" ry="2"/>
    <rect x="-48" y="-13" width="96" height="26" fill="#f5f7fa" rx="1" ry="1"/>
    <line x1="-30" y1="-5" x2="30" y2="-5" stroke="#e74c3c" stroke-width="2"/>
    <line x1="-30" y1="0" x2="20" y2="0" stroke="#e74c3c" stroke-width="2"/>
    <line x1="-30" y1="5" x2="25" y2="5" stroke="#e74c3c" stroke-width="2"/>

    <!-- 书本2 -->
    <rect x="-60" y="-30" width="100" height="25" fill="#3498db" rx="2" ry="2"/>
    <rect x="-58" y="-28" width="96" height="21" fill="#f5f7fa" rx="1" ry="1"/>
    <line x1="-40" y1="-20" x2="20" y2="-20" stroke="#3498db" stroke-width="2"/>
    <line x1="-40" y1="-15" x2="30" y2="-15" stroke="#3498db" stroke-width="2"/>
  </g>

  <!-- 图表 -->
  <g transform="translate(350, 250)">
    <!-- 图表背景 -->
    <rect x="-60" y="-60" width="120" height="120" fill="white" rx="5" ry="5" stroke="#ddd" stroke-width="2"/>

    <!-- 柱状图 -->
    <rect x="-50" y="0" width="20" height="50" fill="#409EFF"/>
    <rect x="-20" y="-20" width="20" height="70" fill="#67C23A"/>
    <rect x="10" y="-40" width="20" height="90" fill="#E6A23C"/>
    <rect x="40" y="-10" width="20" height="60" fill="#F56C6C"/>

    <!-- 图表网格线 -->
    <line x1="-50" y1="-40" x2="60" y2="-40" stroke="#eee" stroke-width="1"/>
    <line x1="-50" y1="-20" x2="60" y2="-20" stroke="#eee" stroke-width="1"/>
    <line x1="-50" y1="0" x2="60" y2="0" stroke="#eee" stroke-width="1"/>
    <line x1="-50" y1="20" x2="60" y2="20" stroke="#eee" stroke-width="1"/>
    <line x1="-50" y1="40" x2="60" y2="40" stroke="#eee" stroke-width="1"/>
  </g>

  <!-- MBA 文字 -->
  <g transform="translate(250, 350)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2c3e50">MBA EDUCATION</text>
  </g>

  <!-- 装饰元素：圆点 -->
  <circle cx="80" cy="80" r="8" fill="#409EFF" opacity="0.7"/>
  <circle cx="100" cy="100" r="5" fill="#67C23A" opacity="0.7"/>
  <circle cx="60" cy="100" r="3" fill="#E6A23C" opacity="0.7"/>

  <circle cx="420" cy="80" r="8" fill="#409EFF" opacity="0.7"/>
  <circle cx="400" cy="100" r="5" fill="#67C23A" opacity="0.7"/>
  <circle cx="440" cy="100" r="3" fill="#E6A23C" opacity="0.7"/>
</svg>